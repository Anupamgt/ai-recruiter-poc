# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Cursor / Copilot"

ai_usage_summary: |
  Pair-programmed the architecture, Stage A RRF fusion, and SQLite in-memory engine with Google DeepMind Antigravity (Gemini 3.1 Pro). No external API calls or network connections occur during the offline ranking step.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  In-memory SQLite/DuckDB Stage 1 scoring pipeline combining Okapi BM25 text relevance against the Target Role (Senior AI Engineer — Founding Team) with a Multiplicative Availability Envelope (M_behav in [0.1, 1.2]). The availability envelope dynamically penalizes inactive profiles (>180 days), low recruiter response rates (<20%), and long notice periods (>60 days). Furthermore, career history seniority is audited against skill claims to naturally sink keyword-stuffer honeypot candidates. A lightweight offline rule engine synthesizes 1-2 sentence evidence-backed justifications for the top 100 finalists in under 4 minutes on CPU.

