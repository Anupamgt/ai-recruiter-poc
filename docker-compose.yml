# AI Recruiter PoC — Docker Compose
# Production mapping:
#   Qdrant → Qdrant Cloud or Vertex AI Vector Search
#   SQLite → Cloud SQL (Postgres)
#   Local folder watcher → GCS bucket + Eventarc + Cloud Functions

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

volumes:
  qdrant_storage:
